# colossus.yaml — generated by scaffolder, read by deploy agents.
# Do not delete. The deploy agents use this instead of framework auto-detection.
# {{IMAGE_NAME}} is a placeholder substituted by the deploy agent at build time.
framework: nextjs
outputDir: .next
baseHref: "/{{IMAGE_NAME}}/"
port: 3000
nginx: none
# Fullstack Next.js (template-nextjs-fullstack): API routes under app/api/**
# serve the backend role in the same container — no separate backend service.
# Prisma (PostgreSQL) is the ORM; DATABASE_URL is provided via app-secrets.
